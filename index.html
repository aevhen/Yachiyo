<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    
    <!-- PWA Manifest and Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <title>Yachiyo - Plant Health Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }
        
        .container { flex: 1; max-width: 900px; margin: 0 auto; padding: 20px; width: 100%; }
        .header { text-align: center; color: white; padding: 20px 0; }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 16px; }
        
        .app-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 600px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .footer { 
            text-align: center; 
            padding: 20px; 
            color: white; 
            font-size: 12px; 
            opacity: 0.8; 
        }
        
        .info {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Yachiyo</h1>
            <p>AI-powered plant disease detection</p>
        </div>
        
        <div class="info">
            Upload a plant leaf image to check its health status
        </div>
        <div class="app-container">
            <iframe src="https://aevhencn-yachiyo.hf.space" allow="camera; microphone"></iframe>
        </div>
    </div>
    <div class="footer">
        Context-Aware Plant Disease Detection Using Image Analysis and Geospatial Data
        <br>
        <a href="https://huggingface.co/spaces/aevhencn/yachiyo" style="color: white; opacity: 0.8;">View on Hugging Face</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yachiyo Plant Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:95%;
max-width:500px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
margin-bottom:20px;
text-align:center;
}

h1{
margin-bottom:10px;
}

#preview{
height:300px;
background:#eee;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin-bottom:20px;
}

#preview img{
width:100%;
height:100%;
object-fit:cover;
}

button{
padding:15px 20px;
border:none;
border-radius:10px;
background:#10b981;
color:white;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#059669;
}

.loading{
display:none;
}

.results{
display:none;
}

.status{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.healthy{
color:#059669;
}

.diseased{
color:#dc2626;
}

.uncertain{
color:#f59e0b;
}

.bar{
height:10px;
background:#eee;
border-radius:5px;
overflow:hidden;
margin:10px 0;
}

.fill{
height:100%;
background:#10b981;
width:0%;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🌿 Yachiyo</h1>
<p>AI Plant Disease Detection</p>

</div>

<div class="card camera-section">

<div id="preview">
📷
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" hidden>

<button onclick="openCamera()">Take Photo</button>

</div>

<div class="card loading" id="loading">

<p>Analyzing plant...</p>

</div>

<div class="card results" id="results">

<div id="status" class="status"></div>

<div>Confidence: <span id="confidenceText"></span></div>

<div class="bar">
<div class="fill" id="confidenceFill"></div>
</div>

<div style="display:flex;gap:10px;margin-top:10px">

<div style="flex:1">
Healthy<br>
<span id="healthyProb"></span>
</div>

<div style="flex:1">
Diseased<br>
<span id="diseasedProb"></span>
</div>

</div>

<br>

<button onclick="resetScan()">Scan Another Plant</button>

</div>

</div>

<script>

let session=null

const MODEL_PATH="./best_model.onnx"

const IMG_SIZE=224

const UNCERTAINTY_THRESHOLD=.7

ort.env.wasm.simd=true
ort.env.wasm.numThreads=navigator.hardwareConcurrency||1


async function loadModel(){

try{

console.log("Loading ONNX model")

session=await ort.InferenceSession.create(
MODEL_PATH,
{executionProviders:['webgpu','wasm']}
)

console.log("Model loaded")

}catch(e){

console.error(e)
alert("Model failed to load")

}

}

window.addEventListener("load",loadModel)


function openCamera(){

if(!session){

alert("Model still loading")
return

}

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").addEventListener("change",async e=>{

const file=e.target.files[0]

if(!file)return

displayImage(file)

await analyzeImage(file)

})


function displayImage(file){

const reader=new FileReader()

reader.onload=e=>{

document.getElementById("preview").innerHTML=
`<img src="${e.target.result}">`

}

reader.readAsDataURL(file)

}


async function analyzeImage(file){

document.querySelector(".camera-section").style.display="none"

document.getElementById("loading").style.display="block"

try{

const prediction=await runInference(file)

displayResults(prediction)

}catch(e){

console.error(e)

alert("Inference error")

resetScan()

}

}


async function runInference(file){

const tensor=await preprocessImage(file)

const inputName=session.inputNames[0]

const feeds={}

feeds[inputName]=tensor

const results=await session.run(feeds)

const outputName=session.outputNames[0]

const output=results[outputName].data

return{
healthyProb:output[0],
diseasedProb:output[1]
}

}


async function preprocessImage(file){

return new Promise(resolve=>{

const reader=new FileReader()

reader.onload=e=>{

const img=new Image()

img.onload=()=>{

const canvas=document.createElement("canvas")

canvas.width=IMG_SIZE
canvas.height=IMG_SIZE

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0,IMG_SIZE,IMG_SIZE)

const imageData=ctx.getImageData(0,0,IMG_SIZE,IMG_SIZE)

const data=imageData.data

const float32Data=new Float32Array(3*IMG_SIZE*IMG_SIZE)

const mean=[0.485,0.456,0.406]
const std=[0.229,0.224,0.225]

for(let i=0;i<IMG_SIZE*IMG_SIZE;i++){

float32Data[i]=((data[i*4]/255)-mean[0])/std[0]

float32Data[i+IMG_SIZE*IMG_SIZE]=((data[i*4+1]/255)-mean[1])/std[1]

float32Data[i+2*IMG_SIZE*IMG_SIZE]=((data[i*4+2]/255)-mean[2])/std[2]

}

resolve(
new ort.Tensor(
"float32",
float32Data,
[1,3,IMG_SIZE,IMG_SIZE]
)
)

}

img.src=e.target.result

}

reader.readAsDataURL(file)

})

}


function displayResults(prediction){

const healthy=prediction.healthyProb
const diseased=prediction.diseasedProb

const maxProb=Math.max(healthy,diseased)

const isHealthy=healthy>diseased

const uncertain=maxProb<UNCERTAINTY_THRESHOLD

let label=""

if(uncertain){

label="Uncertain"

document.getElementById("status").className="status uncertain"

}else if(isHealthy){

label="Healthy"

document.getElementById("status").className="status healthy"

}else{

label="Diseased"

document.getElementById("status").className="status diseased"

}

document.getElementById("status").innerText=label

const confidence=Math.round(maxProb*100)

document.getElementById("confidenceText").innerText=confidence+"%"

document.getElementById("confidenceFill").style.width=confidence+"%"

document.getElementById("healthyProb").innerText=Math.round(healthy*100)+"%"

document.getElementById("diseasedProb").innerText=Math.round(diseased*100)+"%"

document.getElementById("loading").style.display="none"

document.getElementById("results").style.display="block"

}


function resetScan(){

document.querySelector(".camera-section").style.display="block"

document.getElementById("results").style.display="none"

document.getElementById("preview").innerHTML="📷"

}

</script>

</body>
</html>
